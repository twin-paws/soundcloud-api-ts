name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm typecheck
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Build
        run: pnpm build

  openapi-coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync OpenAPI spec
        run: pnpm openapi:sync
        continue-on-error: true  # spec URL may not be reachable in CI
      - name: Check coverage
        run: pnpm openapi:coverage
        continue-on-error: true  # informational only, never block CI
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-coverage
          path: tools/coverage-baseline.json
        if: always()
